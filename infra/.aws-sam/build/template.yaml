AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "Pavillio EDI Option 3 \u2014 LocalStack dev stack"
Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: provided.al2023
    Architectures:
    - x86_64
    Environment:
      Variables:
        DATABASE_URL:
          Ref: DatabaseURL
        REDIS_URL:
          Ref: RedisURL
        OUTBOUND_BUCKET:
          Ref: OutboundBucket
        INBOUND_BUCKET:
          Ref: InboundBucket
        DLQ_URL:
          Ref: ClaimsDLQ
Parameters:
  DatabaseURL:
    Type: String
    Default: postgres://pav:pav@host.docker.internal:5432/pav?sslmode=disable
  RedisURL:
    Type: String
    Default: redis://host.docker.internal:6379/0
  Environment:
    Type: String
    Default: local
Resources:
  OutboundBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: pav-edi-outbound
  InboundBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: pav-edi-inbound
  ClaimsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: pav-edi-claims-dlq.fifo
      FifoQueue: true
      ContentBasedDeduplication: true
  ClaimsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: pav-edi-claims.fifo
      FifoQueue: true
      ContentBasedDeduplication: true
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt:
          - ClaimsDLQ
          - Arn
        maxReceiveCount: 3
  LoadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: pav-edi-load
      Handler: bootstrap
      CodeUri: LoadFunction
      Description: Load claim context and payer config
    Metadata:
      BuildMethod: go1.x
      SamResourceId: LoadFunction
  RulesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: pav-edi-rules
      Handler: bootstrap
      CodeUri: RulesFunction
      Description: CEL rules evaluation
    Metadata:
      BuildMethod: go1.x
      SamResourceId: RulesFunction
  TransformerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: pav-edi-transformer
      Handler: bootstrap
      CodeUri: TransformerFunction
      Description: 837P transform Lambda
    Metadata:
      BuildMethod: go1.x
      SamResourceId: TransformerFunction
  PersistFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: pav-edi-persist
      Handler: bootstrap
      CodeUri: PersistFunction
      Description: Persist EDI to Postgres and S3
    Metadata:
      BuildMethod: go1.x
      SamResourceId: PersistFunction
  PublishDLQFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: pav-edi-publish-dlq
      Handler: bootstrap
      CodeUri: PublishDLQFunction
      Description: Publish structured failures to DLQ
    Metadata:
      BuildMethod: go1.x
      SamResourceId: PublishDLQFunction
  DispatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: pav-edi-dispatch
      Handler: bootstrap
      CodeUri: DispatchFunction
      Description: "SQS FIFO consumer \u2014 runs outbound workflow"
      Events:
        ClaimsQueueEvent:
          Type: SQS
          Properties:
            Queue:
              Fn::GetAtt:
              - ClaimsQueue
              - Arn
            BatchSize: 1
    Metadata:
      BuildMethod: go1.x
      SamResourceId: DispatchFunction
  ParserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: pav-edi-parser
      Handler: bootstrap
      CodeUri: ParserFunction
      Description: Parse inbound 277/999 acknowledgments
      Policies:
      - S3ReadPolicy:
          BucketName:
            Ref: InboundBucket
    Metadata:
      BuildMethod: go1.x
      SamResourceId: ParserFunction
  InboundAckWorkflow:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: pav-edi-inbound-ack
      DefinitionUri: ../../statemachine/inbound.asl.json
      DefinitionSubstitutions:
        ParserFunctionArn:
          Fn::GetAtt:
          - ParserFunction
          - Arn
      Policies:
      - LambdaInvokePolicy:
          FunctionName:
            Ref: ParserFunction
  OutboundClaimWorkflow:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: pav-edi-outbound-claim
      DefinitionUri: ../../statemachine/outbound.asl.json
      DefinitionSubstitutions:
        LoadFunctionArn:
          Fn::GetAtt:
          - LoadFunction
          - Arn
        RulesFunctionArn:
          Fn::GetAtt:
          - RulesFunction
          - Arn
        TransformFunctionArn:
          Fn::GetAtt:
          - TransformerFunction
          - Arn
        PersistFunctionArn:
          Fn::GetAtt:
          - PersistFunction
          - Arn
        PublishDLQFunctionArn:
          Fn::GetAtt:
          - PublishDLQFunction
          - Arn
        OutboundBucketName:
          Ref: OutboundBucket
      Policies:
      - LambdaInvokePolicy:
          FunctionName:
            Ref: LoadFunction
      - LambdaInvokePolicy:
          FunctionName:
            Ref: RulesFunction
      - LambdaInvokePolicy:
          FunctionName:
            Ref: TransformerFunction
      - LambdaInvokePolicy:
          FunctionName:
            Ref: PersistFunction
      - LambdaInvokePolicy:
          FunctionName:
            Ref: PublishDLQFunction
Outputs:
  OutboundClaimWorkflowArn:
    Value:
      Ref: OutboundClaimWorkflow
  ClaimsQueueUrl:
    Value:
      Ref: ClaimsQueue
  ClaimsDLQUrl:
    Value:
      Ref: ClaimsDLQ
  DispatchFunctionArn:
    Value:
      Fn::GetAtt:
      - DispatchFunction
      - Arn
  PublishDLQFunctionArn:
    Value:
      Fn::GetAtt:
      - PublishDLQFunction
      - Arn
  InboundAckWorkflowArn:
    Value:
      Ref: InboundAckWorkflow
  ParserFunctionArn:
    Value:
      Fn::GetAtt:
      - ParserFunction
      - Arn
