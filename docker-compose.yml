services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pav
      POSTGRES_PASSWORD: pav
      POSTGRES_DB: pav
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pav -d pav"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pav_pg_data:/var/lib/postgresql/data

volumes:
  pav_pg_data:
